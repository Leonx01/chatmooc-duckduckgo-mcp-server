version: '3.8'

services:
  duckduckgo-mcp-server:
    build: .
    image: duckduckgo-mcp-server:latest
    container_name: duckduckgo-mcp-server
    ports:
      - "8000:8000"
    environment:
      - DDG_SAFE_SEARCH=MODERATE
      - DDG_REGION=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
